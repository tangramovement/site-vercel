<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <title>Netlify Forms</title>
</head>
<body>
  <form name="tangram-contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" style="display:none">
    <input type="hidden" name="form-name" value="tangram-contact">
    <p><label>Do not fill: <input name="bot-field"></label></p>
    <input name="Name">
    <input name="Email">
    <input name="Phone">
    <input name="Location">
    <select name="Region">
      <option>Brazil</option>
      <option>America</option>
      <option>Europe</option>
      <option>Asia</option>
    </select>
  </form>
</body>
</html>
