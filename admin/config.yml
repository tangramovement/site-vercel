              - label: Titulo
                name: introTitle
                widget: object
                fields:
                  - { label: PT, name: pt, widget: string }
                  - { label: EN, name: en, widget: string }
              - label: Eventos
                name: events
                widget: list
                summary: "{{fields.date}}"
                fields:
                  - { label: Ativo, name: active, widget: boolean, default: true }
                  - { label: Data, name: date, widget: string }
                  - label: Local
                    name: place
                    widget: object
                    fields:
                      - { label: PT, name: pt, widget: string }
                      - { label: EN, name: en, widget: string }
                  - label: Headliner
