local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: uploads
public_folder: /uploads
site_url: https://www.tangramovement.com
display_url: https://www.tangramovement.com
logo_url: /__framer__/images/XkNWobREnQXyQ9K8Wf1rMvGg.svg

editor:
  preview: true

collections:
  - name: site
    label: Site Tangram
    files:
      - name: site
        label: Conteudo do site
        file: content/site.json
        format: json
        fields:
          - label: SEO
            name: seo
            widget: object
            fields:
              - label: Titulo
                name: title
                widget: object
                fields:
                  - { label: PT, name: pt, widget: string }
                  - { label: EN, name: en, widget: string }
              - label: Descricao
                name: description
                widget: object
                fields:
                  - { label: PT, name: pt, widget: text }
                  - { label: EN, name: en, widget: text }
              - { label: Imagem social, name: socialImage, widget: image, required: false }
          - label: Links globais
            name: links
            widget: object
            fields:
              - { label: Instagram, name: instagram, widget: string }
              - { label: Telefone WhatsApp, name: whatsappPhone, widget: string }
              - { label: Link WhatsApp bio, name: whatsappBio, widget: string }
              - { label: Email, name: email, widget: string }
          - label: Menu
            name: menu
            widget: object
            fields:
              - label: Quem Somos
                name: about
                widget: object
                fields:
                  - { label: PT, name: pt, widget: string }
                  - { label: EN, name: en, widget: string }
              - label: Eventos
                name: events
                widget: object
                fields:
                  - { label: PT, name: pt, widget: string }
                  - { label: EN, name: en, widget: string }
              - label: Parceiros
                name: partners
                widget: object
                fields:
                  - { label: PT, name: pt, widget: string }
                  - { label: EN, name: en, widget: string }
              - label: Instagram
                name: instagram
                widget: object
                fields:
                  - { label: PT, name: pt, widget: string }
                  - { label: EN, name: en, widget: string }
              - label: Fale conosco
                name: contact
                widget: object
                fields:
                  - { label: PT, name: pt, widget: string }
                  - { label: EN, name: en, widget: string }
          - label: Hero
            name: hero
            widget: object
            fields:
              - label: Titulo
                name: title
                widget: object
                fields:
                  - { label: PT, name: pt, widget: string }
                  - { label: EN, name: en, widget: string }
              - label: Tickets
                name: tickets
                widget: object
                fields:
                  - { label: PT, name: pt, widget: string }
                  - { label: EN, name: en, widget: string }
              - label: Loading
                name: loading
                widget: object
                fields:
                  - { label: PT, name: pt, widget: string }
                  - { label: EN, name: en, widget: string }
          - label: Agenda
